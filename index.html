    function calcEMA(prices, period) {
      if (prices.length < period) return prices[prices.length - 1] || 0;
      const multiplier = 2 / (period + 1);
      let result = prices.slice(0, period).reduce((a, v) => a + v) / period;
      for (let i = period; i < prices.length; i++) {
        result = prices[i] * multiplier + result * (1 - multiplier);
      }
      return result;
    }

    function calcRSI(prices, period) {
      period = period || 14;
      if (prices.length < period + 1) return 50;
      const slice = prices.slice(-period - 1);
      const changes = [];
      for (let i = 1; i < slice.length; i++) changes.push(slice[i] - slice[i-1]);
      const gains = changes.filter(c => c > 0).reduce((a, v) => a + v, 0) / period;
      const losses = changes.filter(c => c < 0).map(Math.abs).reduce((a, v) => a + v, 0) / period;
      return losses === 0 ? 100 : 100 - 100 / (1 + gains / losses);
    }

    function calcBB(prices, period) {
      period = period || 20;
      if (prices.length < period) {
        const last = prices[prices.length - 1] || 0;
        return { upper: last, lower: last };
      }
      const slice = prices.slice(-period);
      const mean = slice.reduce((a, v) => a + v) / period;
      const std = Math.sqrt(slice.reduce((a, v) => a + Math.pow(v - mean, 2), 0) / period);
      return { upper: mean + 2 * std, lower: mean - 2 * std };
    }

    function getSignal(price, prices) {
      const ema9  = calcEMA(prices, 9);
      const ema20 = calcEMA(prices, 20);
      const rsiVal = calcRSI(prices);
      const bands  = calcBB(prices);
      const volUp  = Math.random() > 0.4;
      let bull = 0, bear = 0;
      if (ema9 > ema20 * 1.001)      bull += 3;
      else if (ema9 < ema20 * 0.999) bear += 3;
      if (rsiVal < 35)       bull += 3;
      else if (rsiVal > 65)  bear += 3;
      else if (rsiVal < 50)  bull += 1;
      else                   bear += 1;
      if (price <= bands.lower * 1.005)      bull += 2;
      else if (price >= bands.upper * 0.995) bear += 2;
      if (volUp) bull += 2; else bear += 2;
      const total   = bull + bear;
      const bullPct = Math.round(bull / total * 100);
      const conf    = Math.max(bullPct, 100 - bullPct);
      if (bullPct >= 75) return { action:"BUY",  color:"#00E676", conf };
      if (bullPct <= 25) return { action:"SELL", color:"#FF3D57", conf };
      return                    { action:"HOLD", color:"#FFB800", conf };
    }

    function buildPriceHistory(base, symbol) {
      const seed = symbol.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
      let price = base;
      const history = [];
      for (let i = 0; i < 60; i++) {
        price *= 1 + Math.sin(i / 8 + seed) * 0.012 + (Math.random() - 0.5) * 0.005;
        history.push(price);
      }
      return history;
    }

    function simulatePrice(base, tick, symbol) {
      const seed = symbol.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
      return base * (1 + Math.sin(tick / 70 + seed) * 0.009 + (Math.random() - 0.5) * 0.004);
    }

      return "$" + Math.abs(num).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    function formatPct(current, previous) {
      const pct = ((current - previous) / Math.abs(previous)) * 100;
      return { text: (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%", positive: pct >= 0 };
    }

                React.createElement("div", { style:{ fontSize:13, fontWeight:700, color:"#fff" } }, ticker.symbol),
                React.createElement("div", { style:{ fontSize:10, color:"#6A7585", marginTop:1 } }, pos.shares.toFixed(4) + " shares")
              ),
              React.createElement("div", { style:{ textAlign:"right" } },
                React.createElement("div", { style:{ fontSize:13, fontWeight:700, color:"#fff" } }, formatUSD(pv)),
                React.createElement("div", { style:{ fontSize:11, color: pc.positive ? "#00E676" : "#FF3D57", fontWeight:600, marginTop:1 } }, pc.text)
              )
            );
          })
        ),

        // ═══ JOURNAL TAB ════════════════════════════════════════════════════
        activeTab === "journal" && React.createElement("div", { style:{ flex:1, overflowY:"auto", paddingBottom:20 } },
          React.createElement("div", { style:{ padding:"46px 16px 14px", fontSize:20, fontWeight:800, color:"#fff" } }, "Trade Journal"),
          tradeLog.length === 0
            ? React.createElement("div", { style:{ textAlign:"center", padding:"40px 0" } },
                React.createElement("div", { style:{ fontSize:36, marginBottom:10 } }, "📝"),
                React.createElement("div", { style:{ fontSize:13, color:"#6A7585" } }, "Trades log here automatically.")
              )
            : tradeLog.map(function(entry) {
                const ec = entry.type === "BUY" ? "#00E676" : "#FF3D57";
                return React.createElement("div", { key: entry.id, style:{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)" } },
                  React.createElement("div", { style:{ width:32, height:32, borderRadius:16, background:ec+"18", border:"1.5px solid "+ec+"35", display:"flex", alignItems:"center", justifyContent:"center", color:ec, fontSize:13, fontWeight:800, flexShrink:0 } },
                    entry.type === "BUY" ? "↑" : "↓"
                  ),
                  React.createElement("div", { style:{ flex:1 } },
                    React.createElement("div", { style:{ fontSize:12, fontWeight:700, color:"#fff" } },
                      React.createElement("span", { style:{ color:ec } }, entry.type),
                      " " + entry.qty + " " + entry.symbol + " @ " + entry.price
                    ),
                    React.createElement("div", { style:{ fontSize:10, color:"#6A7585", marginTop:1 } }, entry.time + " · " + entry.total)
                  )
                );
              })
        ),

        // ═══ BOTTOM NAV ═════════════════════════════════════════════════════
        React.createElement("div", { style:{ display:"flex", background:"rgba(8,10,12,0.97)", borderTop:"1px solid rgba(255,255,255,0.07)", flexShrink:0 } },
          [
            { id:"home",      icon:"📈", label:"Home"      },
            { id:"portfolio", icon:"💼", label:"Portfolio" },
            { id:"journal",   icon:"📓", label:"Journal"   },
          ].map(function(nav) {
            return React.createElement("button", {
              key: nav.id,
              onClick: function() { setActiveTab(nav.id); if (nav.id !== "home") setDetailSymbol(null); },
              style:{ flex:1, background:"none", border:"none", cursor:"pointer", padding:"9px 0 7px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }
            },
              React.createElement("span", { style:{ fontSize:18 } }, nav.icon),
              React.createElement("span", { style:{ fontSize:9, fontWeight:600, color: activeTab === nav.id ? "#00E676" : "#6A7585" } }, nav.label),
              activeTab === nav.id && React.createElement("div", { style:{ width:4, height:4, borderRadius:2, background:"#00E676" } })
            );
          })
        )

      ); // end App return
    } // end App function

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));

  </script>
</body>
</html>
