                        textTransform: 'uppercase',
                        letterSpacing: '0.5px'
                      }}>
                        All Sectors
                      </div>
                      {['Technology', 'Finance', 'Crypto', 'Entertainment', 'E-Commerce'].map(sector => (
                        <div key={sector} style={{ marginBottom: '16px' }}>
                          <div style={{
                            fontSize: '11px',
                            color: '#8A8F98',
                            marginBottom: '8px'
                          }}>
                            {sector}
                          </div>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                            {AVAILABLE_STOCKS
                              .filter(stock => stock.sector === sector)
                              .slice(0, 6)
                              .map(stock => {
                                const isInWatchlist = watchlist.includes(stock.symbol);
                                return (
                                  <button
                                    key={stock.symbol}
                                    onClick={() => !isInWatchlist && addToWatchlist(stock.symbol)}
                                    style={{
                                      padding: '6px 12px',
                                      borderRadius: '16px',
                                      background: isInWatchlist ? 'rgba(0, 230, 118, 0.08)' : 'rgba(255,255,255,0.03)',
                                      border: `1px solid ${isInWatchlist ? 'rgba(0, 230, 118, 0.25)' : 'rgba(255,255,255,0.08)'}`,
                                      color: isInWatchlist ? '#00E676' : '#C8CDD6',
                                      fontSize: '11px',
                                      fontWeight: '600',
                                      cursor: isInWatchlist ? 'default' : 'pointer'
                                    }}
                                  >
                                    {isInWatchlist && '✓ '}{stock.symbol}
                                  </button>
                                );
                              })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                ) : (
                  <div>
                    {searchResults.length === 0 ? (
                      <div style={{
                        textAlign: 'center',
                        padding: '40px',
                        color: '#6A7585'
                      }}>
                        No results for "{searchQuery}"
                      </div>
                    ) : (
                      searchResults.map(stock => {
                        const isInWatchlist = watchlist.includes(stock.symbol);
                        return (
                          <div
                            key={stock.symbol}
                            onClick={() => !isInWatchlist && addToWatchlist(stock.symbol)}
                            style={{
                              display: 'flex',
                              alignItems: 'center',
                              padding: '12px',
                              borderRadius: '12px',
                              background: 'rgba(255,255,255,0.03)',
                              marginBottom: '8px',
                              cursor: isInWatchlist ? 'default' : 'pointer',
                              transition: 'all 0.2s ease'
                            }}
                          >
                            <div style={{
                              width: '40px',
                              height: '40px',
                              borderRadius: '20px',
                              background: 'rgba(0, 201, 255, 0.1)',
                              border: '2px solid rgba(0, 201, 255, 0.3)',
                              display: 'flex',
                              alignItems: 'center',
                              justifyContent: 'center',
                              fontSize: '10px',
                              fontWeight: '800',
                              color: '#00C9FF',
                              marginRight: '12px'
                            }}>
                              {stock.symbol.slice(0, 4)}
                            </div>
                            
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: '14px', fontWeight: '600', color: '#fff' }}>
                                {stock.symbol}
                              </div>
                              <div style={{ fontSize: '12px', color: '#6A7585', marginTop: '2px' }}>
                                {stock.name} • {stock.sector}
                              </div>
                            </div>
                            
                            {isInWatchlist ? (
                              <div style={{
                                padding: '6px 12px',
                                borderRadius: '16px',
                                background: 'rgba(0, 230, 118, 0.1)',
                                color: '#00E676',
                                fontSize: '11px',
                                fontWeight: '600'
                              }}>
                                ✓ Added
                              </div>
                            ) : (
                              <div style={{
                                padding: '6px 16px',
                                borderRadius: '16px',
                                background: 'rgba(0, 201, 255, 0.1)',
                                color: '#00C9FF',
                                fontSize: '11px',
                                fontWeight: '600'
                              }}>
                                + Add
                              </div>
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
